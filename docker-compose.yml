services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — LangGraph state checkpointing
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdlc
      POSTGRES_PASSWORD: sdlc_dev_password
      POSTGRES_DB: sdlc_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdlc -d sdlc_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Observability — OTel Collector + Tempo (traces) + Loki (logs) + Grafana,
  # all in one image. Grafana UI: http://localhost:3001 (anonymous admin).
  # OTLP ports are published so `npm run dev` on the host can export too.
  # ---------------------------------------------------------------------------
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    ports:
      - "3001:3000" # Grafana UI (app owns 3000)
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  # ---------------------------------------------------------------------------
  # SDLC AI — Next.js application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_BUILD: "1"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Generated workspaces land on the host (same path as `npm run dev`
      # runs) and survive `docker compose down`.
      - ./workspace:/app/workspace
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Ollama — local inference (demo flow). host.docker.internal reaches
      # the Ollama server running on the host machine.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:35b}

      # Anthropic — only needed for the full (non-demo) SDLC graph
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # PostgreSQL (uses the compose postgres service)
      DATABASE_URL: postgresql://sdlc:sdlc_dev_password@postgres:5432/sdlc_ai

      # GitHub (optional)
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-}
      GITHUB_REPO: ${GITHUB_REPO:-}

      # MCP server auth tokens (optional — agents skip unconfigured servers)
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      PULUMI_ACCESS_TOKEN: ${PULUMI_ACCESS_TOKEN:-}
      GOOGLE_STITCH_API_KEY: ${GOOGLE_STITCH_API_KEY:-}
      SUPABASE_ACCESS_TOKEN: ${SUPABASE_ACCESS_TOKEN:-}

      # MCP server URL overrides (optional)
      MCP_STITCH_URL: ${MCP_STITCH_URL:-}
      MCP_LINEAR_URL: ${MCP_LINEAR_URL:-}
      MCP_PULUMI_URL: ${MCP_PULUMI_URL:-}
      MCP_NOTION_URL: ${MCP_NOTION_URL:-}
      MCP_SUPABASE_URL: ${MCP_SUPABASE_URL:-}

      # Monitoring (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}

      # OpenTelemetry — traces + logs to the otel-lgtm service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-lgtm:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-sdlc-ai}

volumes:
  pgdata:
